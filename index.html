<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sensor & AQI Dashboard</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #connectBtn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #connectBtn.connected { background: var(--success); }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card h3 { font-size: 0.9rem; color: #666; margin: 0; }
        .value { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        .unit { font-size: 0.8rem; color: #999; }

        /* AQI Box */
        .aqi-section {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        .aqi-display {
            font-size: 4rem;
            font-weight: 900;
            margin: 10px 0;
            transition: color 0.3s ease;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-size: 1.2rem;
        }

        /* History Table */
        .history-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #666; font-size: 0.8rem; border-bottom: 2px solid var(--bg); padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid var(--bg); font-size: 0.9rem; }

        .clear-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            float: right;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Live Sensor Dashboard</h1>
        <button id="connectBtn">🔌 Connect Sensor</button>
    </div>

    <div class="dashboard-grid">
        <div class="card"><h3>Temp (DHT)</h3><div class="value" id="v-temp">--</div><div class="unit">°C</div></div>
        <div class="card"><h3>Humidity</h3><div class="value" id="v-hum">--</div><div class="unit">%</div></div>
        <div class="card"><h3>Pressure</h3><div class="value" id="v-press">--</div><div class="unit">hPa</div></div>
        <div class="card"><h3>Altitude</h3><div class="value" id="v-alt">--</div><div class="unit">m</div></div>
    </div>

    <div class="aqi-section">
        <h2>Air Quality Index (AQI)</h2>
        <div id="aqi-value" class="aqi-display">--</div>
        <span id="aqi-status" class="status-badge" style="background:#ccc">Waiting for Data</span>
        <p style="font-size: 0.8rem; color: #777; margin-top: 15px;">Calculated based on CO, NH3, and Smoke levels</p>
    </div>

    <div class="history-card">
        <button class="clear-btn" onclick="clearHistory()">Clear History</button>
        <h3>Recent Readings Log</h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Temp</th>
                    <th>Humidity</th>
                    <th>AQI Score</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const historyBody = document.getElementById('history-body');
    
    let port;
    let reader;

    // --- 1. LOAD SAVED DATA ON START ---
    window.onload = () => {
        const history = JSON.parse(localStorage.getItem('sensorLog') || '[]');
        renderHistory(history);
        if(history.length > 0) updateMainDisplay(history[0], false); 
    };

    // --- 2. AQI CALCULATION LOGIC ---
    function calculateAQI(gases) {
        // Weighted formula for the dashboard's specific gas sensors
        // Typical "Good" ranges for these specific MQ sensors:
        const score = (gases.co * 0.4) + (gases.nh3 * 0.3) + (gases.smoke * 0.3);
        return Math.round(score * 4); // Scaled for visualization
    }

    function getStatus(aqi) {
        if (aqi < 50) return { label: "Excellent", color: "#28a745" };
        if (aqi < 100) return { label: "Good", color: "#92d050" };
        if (aqi < 150) return { label: "Moderate", color: "#ffc107" };
        return { label: "Poor", color: "#dc3545" };
    }

    // --- 3. UI UPDATES & PERSISTENCE ---
    function updateMainDisplay(data, shouldSave = true) {
        const aqi = calculateAQI(data.gases || data.aqi_raw_data); // Handle both live/saved
        const status = getStatus(aqi);

        document.getElementById('v-temp').textContent = data.temp_dht || data.temp;
        document.getElementById('v-hum').textContent = data.hum;
        document.getElementById('v-press').textContent = data.press || '--';
        document.getElementById('v-alt').textContent = data.alt || '--';
        
        const aqiEl = document.getElementById('aqi-value');
        aqiEl.textContent = aqi;
        aqiEl.style.color = status.color;
        
        const statusEl = document.getElementById('aqi-status');
        statusEl.textContent = status.label;
        statusEl.style.backgroundColor = status.color;

        if (shouldSave) saveToStorage(data, aqi);
    }

    function saveToStorage(data, aqi) {
        let history = JSON.parse(localStorage.getItem('sensorLog') || '[]');
        const entry = {
            time: new Date().toLocaleTimeString(),
            temp: data.temp_dht,
            hum: data.hum,
            aqi: aqi
        };
        history.unshift(entry);
        history = history.slice(0, 10); // Keep last 10
        localStorage.setItem('sensorLog', JSON.stringify(history));
        renderHistory(history);
    }

    function renderHistory(history) {
        historyBody.innerHTML = history.map(h => `
            <tr>
                <td>${h.time}</td>
                <td>${h.temp}°C</td>
                <td>${h.hum}%</td>
                <td style="font-weight:bold; color:${getStatus(h.aqi).color}">${h.aqi}</td>
            </tr>
        `).join('');
    }

    function clearHistory() {
        localStorage.removeItem('sensorLog');
        location.reload();
    }

    // --- 4. SERIAL CONNECTION ---
    connectBtn.addEventListener('click', async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            
            connectBtn.textContent = "✅ Connected";
            connectBtn.classList.add('connected');

            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();

            let buffer = "";
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                
                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    lines.forEach(line => {
                        try {
                            const data = JSON.parse(line);
                            updateMainDisplay(data);
                        } catch(e) {}
                    });
                }
            }
        } catch (err) {
            alert("Serial Connection Failed: " + err);
        }
    });
</script>

</body>
</html>
